<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <link href="styles/popup.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretty-checkbox@3.0/dist/pretty-checkbox.min.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Options & Settings</title>
</head>

<body>
  <div id="app" class="popup-content">
    <div class="kc-grid items-end">
      <div class="kc-col kc-1-2">
        <div class="unit whole center-on-mobiles">
          <div class="heading">
            <h1><img src="images/logo.png" width="190px"></h1>
          </div>

        </div>
      </div>
      <div class="kc-col kc-1-2 d-flex items-center j-content">
        <span>Notifications</span>
        <div class="onoffswitch ml-10">
          <label class="onoffswitch-label">
            <input type="checkbox" name="onoffswitch" class="onoffswitch-checkbox" id="myonoffswitch" checked>
            <span class="onoffswitch-switch round"></span>
          </label>
        </div>
      </div>
    </div>

    <section class="content">
      <hr>
      <div class="kc-grid">
        <div class="kc-col kc-1-3">
          <div class="form-group">
            <label class="days-label">Days Until</label>
            <input type="number" class="days" name="" id="">
          </div>
          <div class="form-group">
            <label for="">Liquidity</label>
            <input type="number" class="liquidity" name="" id="" step="0.5">
          </div>
        </div>
        <div class="kc-col kc-1-3">
          <div class="form-group">
            <label for="">Min SR %</label>
            <input type="number" class="sr" name="" id="" step="0.5">
          </div>
          <div class="form-group">
            <label for="">Min SNR %</label>
            <input type="number" class="snr" name="" id="" step="0.5">
          </div>
        </div>
        <div class="kc-col kc-1-3">
          <div class="form-group">
            <label for="">Min Odds</label>
            <input type="number" class="minodds" name="" id="" step="0.5">
          </div>
          <div class="form-group">
            <label for="">Max Odds</label>
            <input type="number" class="maxodds" name="" id="" step="0.5">
          </div>
        </div>
      </div>
      <hr>
      <div class="kc-grid ck-all-container">
        <div class="kc-col kc-1-3">
          <div class="pretty p-default p-round mb-none">
            <input type="checkbox" id="check-all" />
            <div class="state p-success-o">
              <label>Check All</label>
            </div>
          </div>
        </div>
        <div class="kc-col kc-1-3">
          <div class="pretty p-default p-round mb-none">
            <input type="checkbox" id="uncheck-all" />
            <div class="state p-success-o">
              <label>Uncheck All</label>
            </div>
          </div>
        </div>
        <div class="kc-col kc-1-3">
          <div class="form-group">
            <select class="sportselected">
              <option value="">All Sports</option>
              <option value="Australian Rules Football">AFL</option>
              <option value="Basketball">Basketball</option>
              <option value="Cricket">Cricket</option>
              <option value="NFL">NFL</option>
              <option value="Soccer">Soccer</option>
              <option value="Tennis">Tennis</option>
              <option value="Rugby">Rugby</option>
            </select>
          </div>
        </div>
      </div>
      <hr>
      <div class="kc-grid">
        <div class="kc-col kc-1-3">
          <div class="radio-group">
            <div class="pretty p-default p-round">
              <input type="checkbox" name="bbet" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Bbet</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="bet365" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Bet365</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="betdeluxe" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Betdeluxe</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
                <input type="checkbox" name="betright" class="js-checkbox" />
                <div class="state p-success-o">
                    <label>Betright</label>
                </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="betstar" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Betstar</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="bluebet" class="js-checkbox" />
              <div class="state p-success-o">
                <label>BlueBet</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="bookmaker" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Bookmaker</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="boombet" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Boombet</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
                <input type="checkbox" name="crossbet" class="js-checkbox" />
                <div class="state p-success-o">
                    <label>Crossbet</label>
                </div>
            </div>
          </div>
        </div>
        <div class="kc-col kc-1-3">
          <div class="radio-group">
            <div class="pretty p-default p-round">
              <input type="checkbox" name="elitebet" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Elitebet</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="ladbrokes" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Ladbrokes</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="neds" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Neds</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="palmerbet" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Palmerbet</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
                <input type="checkbox" name="picklebet" class="js-checkbox" />
                <div class="state p-success-o">
                    <label>Picklebet</label>
                </div>
            </div>
            <div class="pretty p-default p-round">
                <input type="checkbox" name="playup" class="js-checkbox" />
                <div class="state p-success-o">
                  <label>PlayUp</label>
                </div>
              </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="pointsbet" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Pointsbet</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
                <input type="checkbox" name="realbookie" class="js-checkbox" />
                <div class="state p-success-o">
                    <label>Realbookie</label>
                </div>
            </div>
          </div>
        </div>
        <div class="kc-col kc-1-3">
          <div class="radio-group">
            <div class="pretty p-default p-round">
                <input type="checkbox" name="robwaterhouse" class="js-checkbox" />
                <div class="state p-success-o">
                    <label>RobWaterHouse</label>
                </div>
            </div>
            <div class="pretty p-default p-round">
                <input type="checkbox" name="sportsbet" class="js-checkbox" />
                <div class="state p-success-o">
                    <label>SoutherncrossBet</label>
                </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="sportsbet" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Sportsbet</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="tab" class="js-checkbox" />
              <div class="state p-success-o">
                <label>Tab</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
                <input type="checkbox" name="texbet" class="js-checkbox" />
                <div class="state p-success-o">
                    <label>TexBet</label>
                </div>
            </div>
            <div class="pretty p-default p-round">
                <input type="checkbox" name="tabtouch" class="js-checkbox" />
                <div class="state p-success-o">
                  <label>TabTouch</label>
                </div>
              </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="topsport" class="js-checkbox" />
              <div class="state p-success-o">
                <label>TopSport</label>
              </div>
            </div>
            <div class="pretty p-default p-round">
              <input type="checkbox" name="unibet" class="js-checkbox" />
              <div class="state p-success-o">
                <label>UniBet</label>
              </div>
            </div>
          </div>
        </div>
      </div>
      <hr>
      <div class="kc-grid">
        <div class="kc-col kc-1-3"></div>
        <div class="kc-col kc-1-3">
          <button type="submit" id="btnSave" class="btnSave">Save Settings</button>
        </div>
      </div>
    </section>
    <footer class="main-footer">
      <div class="grid">
        <div class="unit whole center-on-mobiles">
          <hr>
          <p class="text-center text-muted">
            &copy; BonusBank
          </p>
        </div>
      </div>
    </footer>
  </div>
 <script src="scripts/options.js"></script>
</body>

</html>
