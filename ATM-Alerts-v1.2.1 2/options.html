<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <link href="styles/options.css" rel="stylesheet">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Options & Settings</title>
</head>
<body class="wrap">
  <div class="grid">
    <div class="unit whole center-on-mobiles">
      <div class="heading">
        <h1>BonusBank</h1>
        <p class="lead">Options</p>
      </div>
    </div>
  </div>

  <section class="content">
    <div class="grid">
      <div class="unit whole center-on-mobiles">
        <div class="option">
          <h5>bookies</h5>
          <div class="radio-group">
            <!--<label><input class="js-radio white" type="check" name="algo1" value="white">White</label> -->
            <label><input type="checkbox" name="tab" id="tab" />Tab</label>
            <label><input type="checkbox"  name="betting.club"  id="betting.club"/>Betting.club</label>
            <label><input type="checkbox"  name="sportsbet"  id="sportsbet"/>Sportsbet</label>
            <label><input type="checkbox"  name="pointsbet" id="pointsbet" />Pointsbet</label>
            <label><input type="checkbox" name="topsport" id="topsport"/>TopSport</label>
            <label><input type="checkbox"  name="ladbrokes" id="ladbrokes"/>Ladbrokes</label>
            <label><input type="checkbox"  name="bookmaker" id="bookmaker" />Bookmaker</label>
            <label><input type="checkbox"  name="neds"  id="neds"/>Neds</label>
            <label><input type="checkbox"  name="bet36" id="bet36" />Bet365</label>
            <label><input type="checkbox"  name="pinnacle" id="pinnacle" />Pinnacle</label>
            <label><input type="checkbox" name="ubet" id="ubet" />Ubet</label>
            <label><input type="checkbox" name="bluebet" id="bluebet" />BlueBet</label>
            <label><input type="checkbox" name="betstar" id="betstar" />Betstar</label>
            <label><input type="checkbox" name="tab touch" id="tab touch" />Tab Touch</label>
            <label><input type="checkbox" name="palmerbet" id="palmerbet" />Palmerbet</label>
            <label><input type="checkbox" name="uniBet"  id="uniBet" />UniBet</label>
            <label><input type="checkbox" name="luxbet" id="luxbet" />LuxBet</label>
            <label><input type="checkbox" name="betdeluxe"  id="betdeluxe" />BetDeluxe</label>
            <label><input type="checkbox" name="sportsbetting"  id="sportsbetting" />Sportsbetting</label>
            <label><input type="checkbox" name="elitebet"  id="elitebet" />Elitebet</label>
            <label><input type="checkbox" name="robwaterhouse"  id="robwaterhouse" />RobWaterHouse</label>
          </div>
        </div>
      <hr>
        <div class="option">
          <em class="text-muted">Thresholds Configuration</em>
          <div class="ranking-group" >
            <label>SR<input type="text" id="sr" name="sr" /></label>
            <label>SNR<input type="text" id="snr" name="snr" /></label>
          </div>
        </div>

      </div>
    </div>
  </section>


  <footer class="main-footer">
    <div class="grid">
      <div class="unit whole center-on-mobiles">
        <p class="text-center text-muted">
          &copy; BonusBank Extention
        </p>
      </div>
    </div>

  </footer>
  <script src="scripts/options.js"></script>
</body>
</html>
